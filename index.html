<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Каталог запчастей</title>
  
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="css/main.css?v=20260629" />
</head>

<body>

  <header class="header">
    <div class="header-top">
      <div class="title" data-i18n-key="headerTitle">Каталог продукции PIT</div>

      <div class="toolbar">
        <label for="languageSelect" class="language-label" data-i18n-key="languageLabel">Язык</label>
        <select id="languageSelect">
          <option value="ru">RU</option>
          <option value="en">EN</option>
          <option value="uk">UK</option>
        </select>
      </div>
    </div>

    
    <div class="filters-wrapper">
      <button id="filtersToggle" class="filters-toggle" type="button" data-i18n-key="filterToggle">Фильтр</button>

      <div class="filters" id="filtersPanel">
        <input id="searchInput" type="text" data-i18n-key="searchPlaceholder" data-i18n-attr="placeholder" placeholder="Поиск по названию или артикулу">
        
        <select id="categoryFilter">
          <option value="">Все категории</option>
        </select>

        <select id="scaleFilter">
          <option value="">Все масштабы</option>
        </select>

        <select id="manufacturerFilter" hidden>
          <option value="">Все производители</option>
        </select>
      </div>
    </div>

  </header>

  <main>
    <div id="app"></div>
  </main>

  <script type="module" src="js/app.js"></script>

  <div id="productModal" class="modal hidden">
    <div class="modal-overlay"></div>

    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>

      <div class="modal-grid">
        <div class="modal-image">
          <img id="modalImage" src="img/no-photo.png" alt="product image" data-i18n-key="productImageAlt" data-i18n-attr="alt">
          <div class="modal-thumbs" id="modalThumbnails"></div>
        </div>

        <div class="modal-info">
          <h2 id="modalTitle"></h2>

          <div class="modal-price" id="modalPrice"></div>

          <p class="modal-description" id="modalDescription"></p>

          <h3 data-i18n-key="modalSpecsTitle">Характеристики</h3>
          <ul class="modal-specs" id="modalSpecs"></ul>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
